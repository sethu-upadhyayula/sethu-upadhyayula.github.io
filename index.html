<!DOCTYPE html>
<html lang="en" data-theme="light" data-section="home">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="glfb5eYQUDVrAxoVpuh8ibAjXC2mKruMmuWolNsYk5w" />
    <title>Sethu Madhav Upadhyayula</title>

    <link rel="icon" type="image/png" href="assets/icons/favicon.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="nebula n1" aria-hidden="true"></div>
    <div class="nebula n2" aria-hidden="true"></div>
    <div class="nebula n3" aria-hidden="true"></div>
    <div class="nebula n4" aria-hidden="true"></div>

    <div class="orbital-rings" aria-hidden="true">
        <span class="ring r1"></span>
        <span class="ring r2"></span>
        <span class="ring r3"></span>
        <span class="ring r4"></span>
        <span class="ring r5"></span>
    </div>

    <svg class="constellation-lines" aria-hidden="true" preserveAspectRatio="none" viewBox="0 0 100 100">
        <path d="M2,20 Q20,5 45,15 T85,8"></path>
        <path d="M5,80 Q25,92 50,85 T95,92"></path>
        <path d="M90,25 Q80,45 92,65"></path>
    </svg>

    <div class="orbit-doodles" aria-hidden="true">
        <i class="fas fa-code orbit-doodle" data-section="dev" data-item="1" data-depth="1.6"></i>
        <i class="fas fa-terminal orbit-doodle" data-section="dev" data-item="2" data-depth="1.1"></i>
        <i class="fas fa-code orbit-doodle" data-section="dev" data-item="3" data-depth="0.6"></i>

        <i class="fas fa-dna orbit-doodle" data-section="bio" data-item="1" data-depth="1.1"></i>
        <i class="fas fa-leaf orbit-doodle" data-section="bio" data-item="2" data-depth="1.7"></i>
        <i class="fas fa-dna orbit-doodle" data-section="bio" data-item="3" data-depth="0.6"></i>

        <i class="fas fa-music orbit-doodle" data-section="music" data-item="1" data-depth="1.4"></i>
        <i class="fas fa-music orbit-doodle" data-section="music" data-item="2" data-depth="1.0"></i>
        <i class="fas fa-music orbit-doodle" data-section="music" data-item="3" data-depth="0.6"></i>

        <i class="fas fa-square-root-variable orbit-doodle" data-section="math" data-item="1" data-depth="1.4"></i>
        <i class="fas fa-infinity orbit-doodle" data-section="math" data-item="2" data-depth="1.0"></i>
        <i class="fas fa-square-root-variable orbit-doodle" data-section="math" data-item="3" data-depth="0.6"></i>

        <i class="fas fa-chess-knight orbit-doodle" data-section="chess" data-item="1" data-depth="1.5"></i>
        <i class="fas fa-chess orbit-doodle" data-section="chess" data-item="2" data-depth="1.0"></i>
        <i class="fas fa-chess-knight orbit-doodle" data-section="chess" data-item="3" data-depth="0.6"></i>

        <i class="fas fa-dollar-sign orbit-doodle" data-section="quant" data-item="1" data-depth="1.4"></i>
        <i class="fas fa-arrow-trend-up orbit-doodle" data-section="quant" data-item="2" data-depth="1.0"></i>
        <i class="fas fa-dollar-sign orbit-doodle" data-section="quant" data-item="3" data-depth="0.6"></i>
    </div>

    <main class="pie-stage">
        <div class="pie-wrap">
            <svg viewBox="0 0 1000 1000" class="pie-chart" aria-label="Site sections">
                <defs>
                    <linearGradient id="grad-math" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#1a2b3f"/>
                        <stop offset="100%" stop-color="#06060c"/>
                    </linearGradient>
                    <linearGradient id="grad-quant" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#3d2f0a"/>
                        <stop offset="100%" stop-color="#06060c"/>
                    </linearGradient>
                    <linearGradient id="grad-chess" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#2e1810"/>
                        <stop offset="100%" stop-color="#06060c"/>
                    </linearGradient>
                    <linearGradient id="grad-bio" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#132a1c"/>
                        <stop offset="100%" stop-color="#06060c"/>
                    </linearGradient>
                    <linearGradient id="grad-dev" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#0a2a2d"/>
                        <stop offset="100%" stop-color="#06060c"/>
                    </linearGradient>
                    <linearGradient id="grad-music" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#241a35"/>
                        <stop offset="100%" stop-color="#06060c"/>
                    </linearGradient>

                </defs>

                <a href="math/" aria-label="Math">
                    <path class="pie-wedge" data-section="math" fill="url(#grad-math)"></path>
                </a>
                <a href="quant/" aria-label="Quant">
                    <path class="pie-wedge" data-section="quant" fill="url(#grad-quant)"></path>
                </a>
                <a href="chess/" aria-label="Chess">
                    <path class="pie-wedge" data-section="chess" fill="url(#grad-chess)"></path>
                </a>
                <a href="bio/" aria-label="Bio (coming soon)">
                    <path class="pie-wedge" data-section="bio" fill="url(#grad-bio)"></path>
                </a>
                <a href="dev/" aria-label="Dev (coming soon)">
                    <path class="pie-wedge" data-section="dev" fill="url(#grad-dev)"></path>
                </a>
                <a href="music/" aria-label="Music (coming soon)">
                    <path class="pie-wedge" data-section="music" fill="url(#grad-music)"></path>
                </a>
            </svg>

            <a href="math/" class="wedge-icon-link" data-section="math" aria-label="Math"><i class="fas fa-infinity"></i></a>
            <a href="quant/" class="wedge-icon-link" data-section="quant" aria-label="Quant"><i class="fas fa-dollar-sign"></i></a>
            <a href="chess/" class="wedge-icon-link" data-section="chess" aria-label="Chess"><i class="fas fa-chess"></i></a>
            <a href="bio/" class="wedge-icon-link" data-section="bio" aria-label="Bio (coming soon)"><i class="fas fa-dna"></i></a>
            <a href="dev/" class="wedge-icon-link" data-section="dev" aria-label="Dev (coming soon)"><i class="fas fa-code"></i></a>
            <a href="music/" class="wedge-icon-link" data-section="music" aria-label="Music (coming soon)"><i class="fas fa-music"></i></a>

            <a href="about/" class="pie-center-group" aria-label="About Sethu Upadhyayula">
                <img src="assets/icons/favicon.png" alt="" class="pie-center-img">
            </a>
        </div>
    </main>

    <script src="js/script.js"></script>
    <script src="js/home-pie.js"></script>
    <script src="js/home-parallax.js"></script>

</body>

</html>
