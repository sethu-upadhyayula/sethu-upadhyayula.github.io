.mg-count{font-size:.82rem;color:var(--text-muted,#9aa0a6);margin-bottom:.5rem;}
table.mg-table{width:100%;border-collapse:collapse;font-size:.87rem;}
table.mg-table thead th{background:var(--card-bg,#16213e);color:var(--text-muted,#9aa0a6);font-weight:600;padding:.55rem .6rem;border-bottom:2px solid var(--border-color,#444);white-space:nowrap;position:relative;}
table.mg-table thead th .th-inner{display:inline-flex;align-items:center;gap:.3rem;cursor:pointer;user-select:none;}
table.mg-table thead th .th-inner:hover{color:var(--accent-color,#6c8ebf);}
.sort-icon{font-size:.65rem;opacity:.45;font-style:normal;}
th.sort-asc .sort-icon::before{content:'\f0de';font-family:"Font Awesome 6 Free";font-weight:900;}
th.sort-desc .sort-icon::before{content:'\f0dd';font-family:"Font Awesome 6 Free";font-weight:900;}
th:not(.sort-asc):not(.sort-desc) .sort-icon::before{content:'\f0dc';font-family:"Font Awesome 6 Free";font-weight:900;}
.filter-btn{background:none;border:none;color:var(--text-muted,#9aa0a6);cursor:pointer;padding:0 .15rem;font-size:.72rem;line-height:1;margin-left:.1rem;vertical-align:middle;}
.filter-btn:hover,.filter-btn.has-filter{color:var(--accent-color,#6c8ebf);}
/* filter dropdown */
.filter-drop{position:absolute;top:calc(100% + 2px);left:0;z-index:9999;background:#16213e;border:1px solid #555;border-radius:7px;padding:.5rem;min-width:180px;max-width:260px;max-height:280px;overflow:hidden;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.9);display:none;}
.filter-drop.open{display:flex;}
[data-theme="light"] .filter-drop{background:#f0f0f0;border-color:#bbb;box-shadow:0 8px 32px rgba(0,0,0,.25);}
.fd-search{width:100%;background:var(--bg-color,#1a1a2e);border:1px solid var(--border-color,#444);color:inherit;border-radius:4px;padding:.28rem .5rem;font-size:.8rem;margin-bottom:.35rem;flex-shrink:0;}
.fd-search:focus{outline:none;border-color:var(--accent-color,#6c8ebf);}
.fd-list{overflow-y:auto;flex:1;}
.fd-item{display:flex;align-items:center;gap:.4rem;padding:.22rem .2rem;cursor:pointer;font-size:.82rem;border-radius:3px;}
.fd-item:hover{background:rgba(108,142,191,.12);}
.fd-item input{cursor:pointer;flex-shrink:0;}
.fd-actions{display:flex;gap:.3rem;margin-top:.35rem;flex-shrink:0;}
.fd-act-btn{flex:1;background:none;border:1px solid var(--border-color,#444);color:var(--text-muted,#9aa0a6);border-radius:4px;padding:.2rem;font-size:.75rem;cursor:pointer;text-align:center;}
.fd-act-btn:hover{border-color:var(--accent-color,#6c8ebf);color:var(--accent-color,#6c8ebf);}
/* table rows */
table.mg-table tbody tr{border-bottom:1px solid var(--border-color,#222);}
table.mg-table tbody tr:hover{background:rgba(108,142,191,.06);}
table.mg-table tbody td{padding:.5rem .6rem;vertical-align:middle;}
.td-num{color:var(--text-muted,#9aa0a6);font-size:.78rem;text-align:right;width:2.8rem;white-space:nowrap;}
.td-player{font-size:.88rem;}
.td-player a{color:inherit;text-decoration:none;}
.td-player a:hover{color:var(--accent-color,#6c8ebf);}
.td-muted{color:var(--text-muted,#9aa0a6);font-size:.83rem;}
/* theme badges */
.th-badge{display:inline-block;font-size:.7rem;padding:.18rem .55rem;border-radius:99px;border:1px solid;white-space:nowrap;}
.th-badge.endgame{color:#6eb5a0;border-color:#6eb5a0;}
.th-badge.strategy{color:#6c8ebf;border-color:#6c8ebf;}
.th-badge.brilliancy{color:#e07070;border-color:#e07070;}
.th-badge.tactics{color:#e0a040;border-color:#e0a040;}
.th-badge.combination{color:#a07be0;border-color:#a07be0;}
.th-badge.tbd{color:#888;border-color:#888;}
/* pagination */
.mg-pagination{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-top:1rem;}
.pg-info{font-size:.82rem;color:var(--text-muted,#9aa0a6);}
.pg-btns{display:flex;gap:.3rem;flex-wrap:wrap;align-items:center;}
.pg-btn{background:var(--card-bg,#16213e);border:1px solid var(--border-color,#444);color:var(--text-color,#e0e0e0);border-radius:5px;padding:.3rem .65rem;cursor:pointer;font-size:.82rem;line-height:1.4;}

.pg-btn:disabled{opacity:.3;cursor:default;}
.pg-ellipsis{color:var(--text-muted,#9aa0a6);padding:0 .2rem;font-size:.82rem;}
#mg-empty{display:none;text-align:center;color:var(--text-muted,#9aa0a6);padding:2.5rem 0;}

  var COLS_WITH_FILTER=['w','b','r','o','v','th'];

  function buildDropdowns(){
    COLS_WITH_FILTER.forEach(function(col){
      var drop=document.getElementById('fd-'+col);
      if(!drop) return;

      /* gather distinct non-empty values */
      var seen={};
      GAMES.forEach(function(g){
        var v=gval(g,col);
        if(v) seen[v]=true;
      });
      var vals=Object.keys(seen).sort();

      var html='';
      if(vals.length>8) html+='<input type="text" class="fd-search" placeholder="Search...">';
      html+='<div class="fd-list">';
      vals.forEach(function(v){
        html+='<label class="fd-item"><input type="checkbox" value="'+v.replace(/"/g,'&quot;')+'" checked><span>'+v+'</span></label>';
      });
      html+='</div>';
      html+='<div class="fd-actions"><button class="fd-act-btn" data-act="none">None</button><button class="fd-act-btn" data-act="clear">Clear</button></div>';
      drop.innerHTML=html;

      /* fd-search filter inside dropdown */
      var fdSearch=drop.querySelector('.fd-search');
      if(fdSearch) fdSearch.addEventListener('input',function(e){
        e.stopPropagation();
        var q=this.value.toLowerCase();
        drop.querySelectorAll('.fd-item').forEach(function(item){
          item.style.display=item.querySelector('span').textContent.toLowerCase().indexOf(q)!==-1?'':'none';
        });
      });

      /* checkboxes */
      drop.addEventListener('change',function(e){
        if(e.target.type==='checkbox') updateColFilter(col,drop);
      });

      /* action buttons */
      drop.querySelectorAll('[data-act]').forEach(function(btn){
        btn.addEventListener('click',function(e){
          e.stopPropagation();
          var act=this.dataset.act;
          drop.querySelectorAll('input[type=checkbox]').forEach(function(cb){
            if(act==='all'||act==='clear') cb.checked=true;
            else if(act==='none') cb.checked=false;
          });
          updateColFilter(col,drop);
        });
      });
    });
  }

  function updateColFilter(col,drop){
    var all=Array.from(drop.querySelectorAll('input[type=checkbox]'));
    var checked=all.filter(function(c){return c.checked;}).map(function(c){return c.value;});
    if(checked.length===all.length){ colFilters[col]=null; }
    else { colFilters[col]=new Set(checked); }
    /* update filter-btn highlight */
    var btn=document.querySelector('.filter-btn[data-col="'+col+'"]');
    if(btn) btn.classList.toggle('has-filter', colFilters[col]!==null);

  function render(){
    var filtered=getSorted(getFiltered());
    var total=filtered.length;
    var totalPages=Math.max(1,Math.ceil(total/pageSize));
    if(page>totalPages) page=totalPages;
    var start=(page-1)*pageSize;
    var rows=filtered.slice(start,start+pageSize);

    countEl.textContent=total+' of '+GAMES.length+' games';

    if(total===0){
      body.innerHTML=''; empty.style.display='block';
      pgInfo.textContent=''; pgBtns.innerHTML=''; return;
    }
    empty.style.display='none';

    var html='';
    rows.forEach(function(g,i){
      var thKey=gth(g);
      var thLabel=TH_LABEL[thKey]||thKey;
      html+='<tr class="mg-row" data-href="'+g.u+'" style="cursor:pointer;">'+
        '<td class="td-num">'+(start+i+1)+'</td>'+
        '<td class="td-player">'+g.w+'</td>'+
        '<td class="td-player">'+g.b+'</td>'+
        '<td class="td-muted">'+gr(g)+'</td>'+
        '<td class="td-muted">'+go(g)+'</td>'+
        '<td class="td-muted">'+gv(g)+'</td>'+
        '<td><span class="th-badge '+thKey+'">'+thLabel+'</span></td>'+
        '</tr>';
    });
    body.innerHTML=html;

    pgInfo.innerHTML='Page <input type="number" id="pg-jump" min="1" max="'+totalPages+'" value="'+page+'" style="width:3.5em;background:var(--card-bg,#16213e);border:1px solid var(--border-color,#444);color:inherit;border-radius:4px;padding:.1rem .3rem;font-size:.82rem;text-align:center;"> of '+totalPages+' &nbsp;|&nbsp; Showing '+(start+1)+'-'+Math.min(start+pageSize,total)+' of '+total;
    var _tp=totalPages;
    document.getElementById('pg-jump').addEventListener('change',function(){var v=parseInt(this.value,10);if(v>=1&&v<=_tp){page=v;render();}else{this.value=page;}});
    renderPagination(totalPages);
  }

  function renderPagination(totalPages){
    var html='';
    html+='<button class="pg-btn" id="pg-prev"'+(page===1?' disabled':'')+'>&lsaquo;</button>';
    var lo=Math.max(1,page-2), hi=Math.min(totalPages,page+2);
    if(lo>1){html+='<button class="pg-btn" data-p="1">1</button>';if(lo>2) html+='<span class="pg-ellipsis">&hellip;</span>';}
    for(var p=lo;p<=hi;p++) html+='<button class="pg-btn'+(p===page?' active':'')+'" data-p="'+p+'">'+p+'</button>';

  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var col=this.dataset.col;
      var drop=document.getElementById('fd-'+col);
      var wasOpen=drop.classList.contains('open');
      document.querySelectorAll('.filter-drop').forEach(function(d){d.classList.remove('open');});
      if(!wasOpen) drop.classList.add('open');
    });
  });
  document.querySelectorAll('.filter-drop').forEach(function(d){

  });
  document.addEventListener('click',function(){
    document.querySelectorAll('.filter-drop').forEach(function(d){d.classList.remove('open');});
  });

  body.addEventListener('click',function(e){
