.fd-actions{display:flex;gap:.3rem;margin-top:.35rem;flex-shrink:0;}
.fd-act-btn{flex:1;background:none;border:1px solid var(--border-color,#444);color:var(--text-muted,#9aa0a6);border-radius:4px;padding:.2rem;font-size:.75rem;cursor:pointer;text-align:center;}

var _DR=['1-0','0-1','1/2-1/2'];

(function(){
  var body   = document.getElementById('mg-body');
  var empty  = document.getElementById('mg-empty');

  var sortCol='_i', sortDir='asc';
  var page=1, pageSize=10;

  /* active filter sets — null means all allowed */
  var colFilters={};  /* col -> Set of allowed values, or null */

  var TH_LABEL={endgame:'Endgame',strategy:'Strategy',brilliancy:'Brilliancy',tactics:'Tactics',combination:'Combination'};

  function gth(g){ return g.th || _DTH[g._i % _DTH.length]; }
  function gr(g) { return g.r  || _DR[g._i % _DR.length]; }
  function go(g) { return g.o  || _DO[g._i % _DO.length]; }
  function gv(g) { return g.v  || _DV[g._i % _DV.length]; }

  function gval(g,col){
    if(col==='th') return TH_LABEL[gth(g)]||gth(g);
    if(col==='r')  return gr(g);
    if(col==='o')  return go(g);
    if(col==='v')  return gv(g);
    if(col==='w')  return fullname(g.w);
    if(col==='b')  return fullname(g.b);
    return String(g[col]||'');
  }

  /* ── build filter dropdowns ── */
  var COLS_WITH_FILTER=['w','b','r','o','v','th'];

  function buildDropdowns(){
    COLS_WITH_FILTER.forEach(function(col){
      var drop=document.getElementById('fd-'+col);
      if(!drop) return;

      /* gather distinct non-empty values */
      var seen={};
      GAMES.forEach(function(g){
        var v=gval(g,col);
        if(v) seen[v]=true;
      });
      var vals=Object.keys(seen).sort();

      var html='';
      if(vals.length>8) html+='<input type="text" class="fd-search" placeholder="Search…">';
      html+='<div class="fd-list">';
      vals.forEach(function(v){
        html+='<label class="fd-item"><input type="checkbox" value="'+v.replace(/"/g,'&quot;')+'" checked><span>'+v+'</span></label>';
      });
      html+='</div>';
      html+='<div class="fd-actions"><button class="fd-act-btn" data-act="all">All</button><button class="fd-act-btn" data-act="none">None</button><button class="fd-act-btn" data-act="clear">Clear</button></div>';
      drop.innerHTML=html;

      /* fd-search filter inside dropdown */
      var fdSearch=drop.querySelector('.fd-search');
      if(fdSearch) fdSearch.addEventListener('input',function(e){
        e.stopPropagation();
        var q=this.value.toLowerCase();
        drop.querySelectorAll('.fd-item').forEach(function(item){
          item.style.display=item.querySelector('span').textContent.toLowerCase().indexOf(q)!==-1?'':'none';
        });
      });

      /* checkboxes */
      drop.addEventListener('change',function(e){
        if(e.target.type==='checkbox') updateColFilter(col,drop);
      });

      /* action buttons */
      drop.querySelectorAll('[data-act]').forEach(function(btn){
        btn.addEventListener('click',function(e){
          e.stopPropagation();
          var act=this.dataset.act;
          drop.querySelectorAll('input[type=checkbox]').forEach(function(cb){
            if(act==='all'||act==='clear') cb.checked=true;
            else if(act==='none') cb.checked=false;
          });
          updateColFilter(col,drop);
        });
      });
    });
  }

  function updateColFilter(col,drop){
    var all=Array.from(drop.querySelectorAll('input[type=checkbox]'));
    var checked=all.filter(function(c){return c.checked;}).map(function(c){return c.value;});
    if(checked.length===all.length){ colFilters[col]=null; }
    else { colFilters[col]=new Set(checked); }
    /* update filter-btn highlight */
    var btn=document.querySelector('.filter-btn[data-col="'+col+'"]');
    if(btn) btn.classList.toggle('has-filter', colFilters[col]!==null);
    page=1; render();
  }

  /* ── filter + sort ── */
  function getFiltered(){
    var q=search.value.toLowerCase().trim();
    return GAMES.filter(function(g){
      if(q){
        var hay=(g.w+' '+g.b+' '+(g.r||'')+' '+(g.o||'')+' '+(g.v||'')+' '+gth(g)).toLowerCase();
        if(hay.indexOf(q)===-1) return false;
      }
      for(var col in colFilters){
        if(!colFilters[col]) continue;
        if(!colFilters[col].has(gval(g,col))) return false;
      }
      return true;
    });
  }

  function getSorted(arr){
    return arr.slice().sort(function(a,b){
      var av=sortCol==='_i'?a._i:gval(a,sortCol).toLowerCase();
      var bv=sortCol==='_i'?b._i:gval(b,sortCol).toLowerCase();
      if(av<bv) return sortDir==='asc'?-1:1;
      if(av>bv) return sortDir==='asc'?1:-1;
      return 0;
    });
  }

  /* ── render ── */
  function render(){
    var filtered=getSorted(getFiltered());
    var total=filtered.length;
    var totalPages=Math.max(1,Math.ceil(total/pageSize));
    if(page>totalPages) page=totalPages;
    var start=(page-1)*pageSize;
    var rows=filtered.slice(start,start+pageSize);

    countEl.textContent=total+' of '+GAMES.length+' games';

    if(total===0){
      body.innerHTML=''; empty.style.display='block';
      pgInfo.textContent=''; pgBtns.innerHTML=''; return;
    }
    empty.style.display='none';

    var html='';
    rows.forEach(function(g,i){
      var thKey=gth(g);
      var thLabel=TH_LABEL[thKey]||thKey;
      html+='<tr class="mg-row" data-href="'+g.u+'" style="cursor:pointer;">'+
        '<td class="td-num">'+(start+i+1)+'</td>'+
        '<td class="td-player">'+fullname(g.w)+'</td>'+
        '<td class="td-player">'+fullname(g.b)+'</td>'+
        '<td class="td-muted">'+gr(g)+'</td>'+
        '<td class="td-muted">'+go(g)+'</td>'+
        '<td class="td-muted">'+gv(g)+'</td>'+
        '<td><span class="th-badge '+thKey+'">'+thLabel+'</span></td>'+
        '</tr>';
    });
    body.innerHTML=html;

    pgInfo.textContent='Showing '+(start+1)+'-'+Math.min(start+pageSize,total)+' of '+total;
    renderPagination(totalPages);
  }

  function renderPagination(totalPages){
    var html='';
    html+='<button class="pg-btn" id="pg-prev"'+(page===1?' disabled':'')+'>&lsaquo;</button>';
    var lo=Math.max(1,page-2), hi=Math.min(totalPages,page+2);
    if(lo>1){html+='<button class="pg-btn" data-p="1">1</button>';if(lo>2) html+='<span class="pg-ellipsis">&hellip;</span>';}
    for(var p=lo;p<=hi;p++) html+='<button class="pg-btn'+(p===page?' active':'')+'" data-p="'+p+'">'+p+'</button>';
    if(hi<totalPages){if(hi<totalPages-1) html+='<span class="pg-ellipsis">&hellip;</span>';html+='<button class="pg-btn" data-p="'+totalPages+'">'+totalPages+'</button>';}
    html+='<button class="pg-btn" id="pg-next"'+(page===totalPages?' disabled':'')+'>&rsaquo;</button>';
    pgBtns.innerHTML=html;
    document.getElementById('pg-prev').addEventListener('click',function(){if(page>1){page--;render();}});
    document.getElementById('pg-next').addEventListener('click',function(){if(page<Math.ceil(getFiltered().length/pageSize)){page++;render();}});
    pgBtns.querySelectorAll('[data-p]').forEach(function(b){b.addEventListener('click',function(){page=+this.dataset.p;render();});});
  }

  /* ── sort click on th-inner ── */
  document.querySelectorAll('.th-inner').forEach(function(inner){
    inner.addEventListener('click',function(){
      var col=this.dataset.col;
      if(sortCol===col) sortDir=sortDir==='asc'?'desc':'asc';
      else{sortCol=col;sortDir='asc';}
      document.querySelectorAll('thead th').forEach(function(h){h.classList.remove('sort-asc','sort-desc');});
      this.closest('th').classList.add('sort-'+sortDir);
      page=1; render();
    });
  });

  /* ── filter dropdown open/close ── */
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var col=this.dataset.col;
      var drop=document.getElementById('fd-'+col);
      var wasOpen=drop.classList.contains('open');
      document.querySelectorAll('.filter-drop').forEach(function(d){d.classList.remove('open');});
      if(!wasOpen) drop.classList.add('open');
    });
  });
  document.querySelectorAll('.filter-drop').forEach(function(d){
    d.addEventListener('click',function(e){e.stopPropagation();});
  });
  document.addEventListener('click',function(){
    document.querySelectorAll('.filter-drop').forEach(function(d){d.classList.remove('open');});
  });

  body.addEventListener('click',function(e){
    var row=e.target.closest('.mg-row');
    if(row) window.location.href=row.dataset.href;
  });

  search.addEventListener('input',function(){page=1;render();});
  perSel.addEventListener('change',function(){pageSize=+this.value;page=1;render();});

  /* ── init ── */
  document.querySelector('th#th-idx').classList.add('sort-asc');
  buildDropdowns();
  render();
})();
</script>
</body></html>
